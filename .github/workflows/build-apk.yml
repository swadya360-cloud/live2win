name: Build Live2Win APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project
        run: |
          mkdir -p live2win-apk/app/src/main/java/com/live2win/app
          mkdir -p live2win-apk/app/src/main/res/mipmap-hdpi
          mkdir -p live2win-apk/app/src/main/res/mipmap-mdpi
          mkdir -p live2win-apk/app/src/main/res/mipmap-xhdpi
          mkdir -p live2win-apk/app/src/main/res/mipmap-xxhdpi
          mkdir -p live2win-apk/app/src/main/res/mipmap-xxxhdpi
          mkdir -p live2win-apk/app/src/main/res/values
          mkdir -p live2win-apk/app/src/main/res/xml
          mkdir -p live2win-apk/gradle/wrapper

      - name: Create MainActivity.java
        run: |
          cat > live2win-apk/app/src/main/java/com/live2win/app/MainActivity.java << 'EOF'
          package com.live2win.app;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.webkit.CookieManager;
          import android.view.Window;
          import android.view.WindowManager;
          import android.graphics.Color;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;
          import android.content.Context;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.view.Gravity;

          public class MainActivity extends Activity {
              private WebView webView;
              private static final String APP_URL = "https://darling-gumption-8ad02b.netlify.app/";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );

                  if (!isNetworkAvailable()) {
                      showNoInternet();
                      return;
                  }

                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setLoadsImagesAutomatically(true);
                  settings.setUserAgentString(settings.getUserAgentString() + " Live2WinApp/1.0");

                  CookieManager.getInstance().setAcceptCookie(true);
                  CookieManager.getInstance().setAcceptThirdPartyCookies(webView, true);

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          view.loadUrl(url);
                          return true;
                      }
                  });

                  webView.setBackgroundColor(Color.parseColor("#0a0a0a"));
                  webView.loadUrl(APP_URL);
              }

              private boolean isNetworkAvailable() {
                  ConnectivityManager cm = (ConnectivityManager) getSystemService(Context.CONNECTIVITY_SERVICE);
                  NetworkInfo info = cm.getActiveNetworkInfo();
                  return info != null && info.isConnected();
              }

              private void showNoInternet() {
                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setGravity(Gravity.CENTER);
                  layout.setBackgroundColor(Color.parseColor("#0a0a0a"));

                  TextView emoji = new TextView(this);
                  emoji.setText("📶");
                  emoji.setTextSize(60);
                  emoji.setGravity(Gravity.CENTER);

                  TextView msg = new TextView(this);
                  msg.setText("No Internet Connection\nPlease check your network and restart the app.");
                  msg.setTextColor(Color.WHITE);
                  msg.setTextSize(16);
                  msg.setGravity(Gravity.CENTER);
                  msg.setPadding(40, 20, 40, 20);

                  layout.addView(emoji);
                  layout.addView(msg);
                  setContentView(layout);
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Create AndroidManifest.xml
        run: |
          cat > live2win-apk/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.live2win.app">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Live2Win"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create styles.xml
        run: |
          cat > live2win-apk/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen">
                  <item name="android:windowBackground">#0a0a0a</item>
                  <item name="android:statusBarColor">#0a0a0a</item>
              </style>
          </resources>
          EOF

      - name: Create strings.xml
        run: |
          cat > live2win-apk/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Live2Win</string>
          </resources>
          EOF

      - name: Process App Icon
        run: |
          sudo apt-get install -y imagemagick
          ICON_FILE=$(find . -name "Picsart*" -o -name "icon*" -o -name "*.png" | grep -v ".git" | head -1)
          echo "Found icon: $ICON_FILE"

          if [ -n "$ICON_FILE" ]; then
            convert "$ICON_FILE" -resize 72x72 live2win-apk/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert "$ICON_FILE" -resize 72x72 live2win-apk/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            convert "$ICON_FILE" -resize 48x48 live2win-apk/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert "$ICON_FILE" -resize 48x48 live2win-apk/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            convert "$ICON_FILE" -resize 96x96 live2win-apk/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert "$ICON_FILE" -resize 96x96 live2win-apk/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            convert "$ICON_FILE" -resize 144x144 live2win-apk/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert "$ICON_FILE" -resize 144x144 live2win-apk/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            convert "$ICON_FILE" -resize 192x192 live2win-apk/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            convert "$ICON_FILE" -resize 192x192 live2win-apk/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          else
            for size in "72:hdpi" "48:mdpi" "96:xhdpi" "144:xxhdpi" "192:xxxhdpi"; do
              S=$(echo $size | cut -d: -f1)
              D=$(echo $size | cut -d: -f2)
              convert -size ${S}x${S} xc:'#FF6B00' -fill white -gravity center \
                -font DejaVu-Sans-Bold -pointsize $((S/3)) -annotate 0 'L2W' \
                live2win-apk/app/src/main/res/mipmap-$D/ic_launcher.png
              cp live2win-apk/app/src/main/res/mipmap-$D/ic_launcher.png \
                live2win-apk/app/src/main/res/mipmap-$D/ic_launcher_round.png
            done
          fi

      - name: Create app build.gradle
        run: |
          cat > live2win-apk/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              compileSdk 34
              namespace 'com.live2win.app'

              defaultConfig {
                  applicationId "com.live2win.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
          }
          EOF

      - name: Create root build.gradle
        run: |
          cat > live2win-apk/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          EOF

      - name: Create settings.gradle
        run: |
          cat > live2win-apk/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "live2win"
          include ':app'
          EOF

      - name: Create gradle wrapper properties
        run: |
          cat > live2win-apk/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Setup Gradle Wrapper
        run: |
          cd live2win-apk
          gradle wrapper --gradle-version 8.0 || true
          chmod +x gradlew 2>/dev/null || true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Release APK
        run: |
          cd live2win-apk
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Live2Win-APK
          path: live2win-apk/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
